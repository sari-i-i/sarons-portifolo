<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saron Portfolio - Home</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}
body {
    background: linear-gradient(to right, #f789e3, #b387e8);
}

/* NAVBAR */
nav {
    width: 100%;
    height: 70px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 40px;
    background: rgb(197, 135, 215);
    position: sticky;
    top: 0;
    z-index: 10;
}
nav .logo {
    font-size: 25px;
    font-weight: bold;
}
nav .logo span {
    color: #501e67;
}
nav .nav-links a {
    margin: 15px;
    text-decoration: none;
    color: black;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}
nav .nav-links a:hover {
    color: #c19eea;
}

/* HOME SECTION */
#home {
    height: 100vh;
    display: flex;
    justify-content: space-around;
    align-items: center;
    flex-wrap: wrap;
    padding: 20px;
}

/* PROFILE IMAGE CIRCLE */
.profile-image img {
    width: 300px;
    height: 300px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #866f89;
    box-shadow: 0 0 15px rgba(240, 166, 229, 0.3);
}

/* CONTENT */
.content {
    width: 40%;
    min-width: 280px;
    text-align: left;
}
.content h1 {
    font-size: 40px;
    margin-bottom: 10px;
}
.content span {
    color: #542d5b;
}
.typing-text {
    font-size: 25px;
    font-weight: 600;
    margin: 10px 0;
    white-space: nowrap;
    overflow: hidden;
    border-right: 3px solid #6d4300;
    animation: typing 3s steps(20) infinite alternate;
}
@keyframes typing {
    0% { width: 0; }
    50% { width: 100%; }
    100% { width: 0; }
}

/* PARAGRAPH & BUTTON */
.content p {
    margin: 15px 0;
    font-size: 18px;
}
button {
    padding: 10px 20px;
    background: #6d4300;
    color: white;
    border: none;
    cursor: pointer;
    margin-top: 20px;
}
button:hover {
    transform: scale(1.1);
}

/* SOCIAL ICONS */
.social-media-links i {
    width: 40px;
    height: 40px;
    border: 2px solid #5a374e;
    border-radius: 50%;
    display: inline-flex;
    justify-content: center;
    align-items: center;
    margin: 10px;
    color: #580849;
    cursor: pointer;
}
.social-media-links i:hover {
    background: #530937;
    color: white;
    transform: scale(1.2);
}

/* RESPONSIVE */
@media(max-width:768px){
    #home {
        flex-direction: column;
        text-align: center;
    }
    .profile-image img {
        width: 200px;
        height: 200px;
        margin-bottom: 20px;
    }
    .content {
        width: 80%;
    }
}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav>
    <div class="logo">Saron <span>Portfolio</span></div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="contact.html">Contact</a>
    </div>
</nav>

<!-- HOME SECTION -->
<section id="home">
    <div class="profile-image">
        <img src="images/jabari2.jpg" alt="Profile Image">
    </div>
    <div class="content">
        <h1>Hello, I am <span>Saron</span></h1>
        <div class="typing-text">I am a Web Developer</div>
        <p>I am a passionate front-end developer who enjoys creating modern, responsive websites.</p>
        <p>I specialize in designing user-friendly and visually appealing websites for clients worldwide.</p>
        <div class="social-media-links">
            <i class="fa-brands fa-github"></i>
            <i class="fa-brands fa-facebook"></i>
            <i class="fa-brands fa-linkedin"></i>
            <i class="fa-brands fa-x-twitter"></i>
        </div>
        <button></button>
    </div>
</section>

</body>
</html>
